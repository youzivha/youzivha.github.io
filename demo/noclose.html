<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不关网页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #e0f7fa, #f5f5f5);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .title {
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .tip {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        #enableBtn {
            background: #2d8cf0;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        #enableBtn:hover {
            background: #2b85e4;
        }

        #enableBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            margin-top: 25px;
            font-size: 17px;
            font-weight: bold;
            color: #999;
        }

        .active {
            color: #27ae60 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🔒 小马的网页防误关闭保护</h1>
        <p class="tip">点击下方按钮后，关闭/刷新页面会弹出确认提醒<br>防止意外关闭丢失内容</p>
        
        <button id="enableBtn">帅哥请点击</button>
        <div class="status" id="statusText">保护状态：未激活</div>
    </div>

    <script>
        let isProtected = false;
        const enableBtn = document.getElementById('enableBtn');
        const statusText = document.getElementById('statusText');

        // 点击按钮激活保护
        enableBtn.addEventListener('click', function() {
            isProtected = true;
            enableBtn.disabled = true;
            enableBtn.textContent = "✅ 已生效，为你护航";
            statusText.textContent = "已激活，认真工作";
            statusText.classList.add('active');
        });

        // 关闭/刷新提醒
        window.addEventListener('beforeunload', function(e) {
            if (!isProtected) return; // 未激活则不弹窗
            
            const msg = "宝下班了吗？未保存的内容可能会丢失！";
            e.returnValue = msg;
            return msg;
        });
    </script>
</body>
</html>
